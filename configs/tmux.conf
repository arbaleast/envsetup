# ~/.tmux.conf - tmux 配置

# 基础设置
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# 前缀键
unbind C-b
set -g prefix C-j
bind C-j send-prefix

# 快速重新加载配置
bind r source-file ~/.tmux.conf \; display "配置文件已重载"

# 分屏
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 切换面板
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 支持鼠标
set -g mouse on

# 状态栏
set -g status-interval 1
set -g status-style bg=colour237,fg=colour255
set -g status-left-length 50
set -g status-right-length 60
set -g status-left "#[fg=colour235,bg=colour148] #S #[fg=colour148,bg=colour237,nobold]"
set -g status-right "#[fg=colour235,bg=colour239] %m/%d %H:%M:%S #[fg=colour148,bg=colour235] #(whoami)@#h "

# 当前窗口高亮
set -g window-status-current-style bg=colour237,fg=colour148,bold
set -g window-status-current-format " #I: #W "

# 窗口列表样式
set -g window-status-style bg=colour239,fg=colour247
set -g window-status-format " #I: #W "

# 复制模式
set -g history-limit 50000
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# 从系统剪贴板复制
bind C-y run "tmux save-buffer - | xclip -selection clipboard"

# 窗口编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 自动重编号窗口
set -g renumber-windows on

# 支持 Ctrl+Left/Right 切换窗口
bind-key -n C-Left previous-window
bind-key -n C-Right next-window

# TPM 插件
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect 设置
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'on'

# continuum 设置
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'

# 初始化 TPM (必须在最后)
run '~/.tmux/plugins/tpm/tpm'
